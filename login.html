<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - EEG Smart Lab</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        :root {
            --medical-blue: #1e3a8a; /* الكحلي الرسمي المستعمل في الاشتراك */
            --startup-blue: #0ea5e9;
            --dark-navy: #0f172a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .split-screen { display: flex; height: 100vh; width: 100%; }

        /* الجهة اليسرى: معلومات ترحيبية وصورة الطبيب */
        .info-side {
            flex: 1;
            background-color: var(--medical-blue); /* توحيد اللون مع صفحة الاشتراك */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
        }

        .info-content { z-index: 10; text-align: center; max-width: 400px; }
        
        .doctor-img { 
            width: 160px; height: 160px; border-radius: 50%; 
            border: 4px solid white; margin-bottom: 25px;
            object-fit: cover; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* جهة فورم الدخول (اليمين) */
        .login-side {
            flex: 1.2;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .form-container { width: 100%; max-width: 400px; }
        .login-title { color: var(--medical-blue); font-weight: 800; font-size: 2.5rem; margin-bottom: 10px; }
        .login-subtitle { color: #64748b; margin-bottom: 35px; }

        .form-label { font-weight: 600; color: #374151; margin-bottom: 8px; }

        .form-control {
            border-radius: 8px; padding: 12px 15px;
            border: 1px solid #e2e8f0; background-color: #f8fafc;
            margin-bottom: 20px;
        }

        .btn-login {
            background-color: var(--medical-blue);
            color: white; border: none; width: 100%;
            padding: 15px; border-radius: 8px;
            font-weight: 700; text-transform: uppercase;
            transition: 0.3s; margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #162e70;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
        }

        .back-link {
            display: block; text-align: center; margin-top: 25px;
            color: #64748b; text-decoration: none; font-weight: 600;
        }
        .back-link span { color: var(--medical-blue); text-decoration: underline; }
        /* هذا الكود يخدم غير كي تفتحي من التيليفون (شاشة صغيرة) */
@media (max-width: 600px) {
    body {
        padding: 10px; /* نخلو شوية فراغ في الجوانب */
    }

    /* العنوان نتاعك "Analyse Neurale IA" نرجوه يتوسط الشاشة */
    h1, h2 {
        font-size: 24px !important;
        text-align: center;
    }

    /* الأزرار نرجوهم يدو عرض الشاشة كامل باش يجو ساهلين للمس */
    .btn-login, .btn-scan, button {
        width: 100% !important;
        margin-bottom: 15px;
        height: 55px; /* نكبروهم شوية للصبع */
        font-size: 18px !important;
    }

    /* المربعات السوداء (Grids) نرجعوهم يجوا واحد فوق واحد */
    .container, .grid-layout {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    /* إذا عندك Sidebar يولي يختفي أو يجي الفوق */
    .sidebar {
        width: 100% !important;
        position: relative !important;
    }
}

    </style>
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>

    <div class="split-screen">
        
        <!-- Côté Gauche: Bienvenue & Photo -->
        <div class="info-side">
            <div class="info-content">
                <img src="{{ url_for('static', filename='image/medecin1.jpg') }}" class="doctor-img" alt="Doctor Profile">
                <h2 class="fw-bold mb-3">Bon retour, Docteur</h2>
                <p style="color: #d1d5db; line-height: 1.8;">Utilisez nos outils d'intelligence artificielle pour analyser les signaux EEG avec précision et rapidité.</p>
                <div class="mt-4">
                    <span class="badge bg-light text-primary p-2">Système de Diagnostic v2.0</span>
                </div>
            </div>
        </div>

        <!-- Côté Droit: Formulaire de Connexion -->
        <div class="login-side">
            <div class="form-container">
                <h1 class="login-title">Connexion</h1>
                <p class="login-subtitle">Veuillez saisir vos identifiants pour accéder au tableau de bord.</p>

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" placeholder="Entrez votre pseudo" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-login">Se Connecter 🔬</button>
                </form>

                <a href="/" class="back-link">Vous n'avez pas de compte ? <span>Inscrivez-vous</span></a>
            </div>
        </div>

    </div>

</body>
</html>
