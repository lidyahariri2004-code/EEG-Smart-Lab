<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEG Core | Medical AI Monitor</title>
    
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #020406;
            --panel-bg: #0d1117;
            --neon-blue: #00f2ff;
            --neon-red: #ff0044;
            --grid-color: rgba(0, 242, 255, 0.05);
        }

        body { 
            background-color: var(--bg-deep); color: #e2e8f0; 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden;
            display: flex; height: 100vh;
        }

        /* الجانب الأيسر - القائمة الجانبية */
        .sidebar { 
            width: 380px; 
            background: var(--panel-bg); border-right: 2px solid #161b22;
            display: flex; flex-direction: column; padding: 20px; z-index: 100;
        }

        /* ستايل بروفايل الدكتور الجديد */
        .doctor-profile {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
            width: 85px;
            height: 85px;
            margin: 0 auto 12px;
        }

        .doctor-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%; /* دائرية تماماً */
            object-fit: cover;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .status-online {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 15px;
            height: 15px;
            background: #23d160;
            border-radius: 50%;
            border: 2px solid var(--panel-bg);
        }

        .welcome-msg { font-size: 0.8rem; color: #8b949e; margin-bottom: 2px; }
        .doctor-name { font-size: 1.1rem; font-weight: bold; color: white; margin: 0; }

        .file-queue {
            flex-grow: 1; overflow-y: auto; margin-top: 10px; padding-right: 5px;
        }

        .file-item {
            background: rgba(255,255,255,0.02); border: 1px solid #30363d;
            border-radius: 12px; padding: 12px; margin-bottom: 15px;
            font-size: 0.85rem; transition: 0.3s;
            display: flex; flex-direction: column; gap: 8px;
        }
        
        .file-info-top { display: flex; justify-content: space-between; align-items: center; }

        .scalogram-preview {
            width: 100%; height: 80px; background: #000; border-radius: 8px;
            object-fit: cover; border: 1px solid #444; display: none; 
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .file-item.processing { border-color: var(--neon-blue); }
        .file-item.danger { border-color: var(--neon-red); background: rgba(255, 0, 68, 0.1); }

        /* الشاشة الرئيسية */
        .main-monitor {
            flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        .screen-container {
            flex-grow: 1; background: #000; border: 2px solid #333;
            border-radius: 10px; position: relative; overflow: hidden;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #mainChart { filter: drop-shadow(0 0 5px var(--neon-blue)); }

        .emergency-active { animation: shake 0.15s infinite; border: 4px solid var(--neon-red) !important; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-4px, 2px); } 75% { transform: translate(4px, -2px); } }

        #overlay-text {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--neon-red); font-size: 5rem; font-weight: 900; z-index: 10;
            text-shadow: 0 0 20px rgba(255,0,0,0.8);
        }

        .btn-action { padding: 12px 30px; border-radius: 8px; font-weight: bold; border: none; text-transform: uppercase; }
        .btn-lancer { background: var(--neon-blue); color: #000; }
        .btn-stop { background: var(--neon-red); color: #fff; display: none; }

        .btn-logout {
            margin-top: 15px; border: 1px solid var(--neon-red);
            color: var(--neon-red); background: transparent; transition: 0.3s;
        }
        .btn-logout:hover {
            background: var(--neon-red); color: white;
            box-shadow: 0 0 15px rgba(255, 0, 68, 0.4);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="doctor-profile">
            <div class="avatar-wrapper">
                <img src="https://ui-avatars.com/api/?name={{ session['user_name'] }}&background=00f2ff&color=000&bold=true" 
                     class="doctor-avatar" alt="Dr Profile">
                <div class="status-online"></div>
            </div>
            <div class="welcome-msg">Bienvenue,</div>
            <h5 class="doctor-name">Dr. {{ session['user_name'] }}</h5>
        </div>

        <h4 class="text-info mb-3" style="font-size: 1.1rem;"><i class="fas fa-microchip me-2"></i> EEG AI SYSTEM</h4>
        
        <button class="btn btn-outline-info w-100 mb-3" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-plus-circle me-2"></i> AJOUTER SÉQUENCES
            <input type="file" id="fileInput" multiple class="d-none" onchange="handleFiles()">
        </button>

        <div class="file-queue" id="fileQueue">
            </div>

        <div class="sidebar-footer">
            <button class="btn btn-secondary w-100 mb-2" onclick="location.reload()">
                <i class="fas fa-sync-alt me-2"></i> REINITIALISER
            </button>
            <a href="{{ url_for('logout') }}" class="btn btn-logout w-100">
                <i class="fas fa-sign-out-alt me-2"></i> DÉCONNEXION
            </a>
        </div>
    </div>

    <div class="main-monitor">
        <div class="d-flex justify-content-between align-items-end">
            <div>
                <h4 class="m-0" style="letter-spacing: 2px;">OSCILLOSCOPE TEMPS RÉEL</h4>
                <small id="currentFileLabel" class="text-info opacity-75">Attente de données...</small>
            </div>
            <div id="statusDot" class="text-success"><i class="fas fa-shield-alt me-2"></i> AI GUARDIAN ACTIVE</div>
        </div>

        <div class="screen-container" id="screenBox">
            <div id="overlay-text">ALERTE CRISE</div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="d-flex justify-content-center gap-3">
            <button class="btn-action btn-lancer" id="startBtn" onclick="processQueue()">Lancer l'Analyse</button>
            <button class="btn-action btn-stop" id="stopBtn" onclick="resumeAnalysis()">Confirmer & Continuer</button>
        </div>
    </div>

    <audio id="alarm" src="https://actions.google.com/sounds/v1/emergency/emergency_siren_short.ogg" loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let queue = [];
        let currentIndex = 0;
        let chart;
        let isPaused = false;

        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(100).fill(''),
                datasets: [{ data: [], borderColor: '#00f2ff', borderWidth: 3, pointRadius: 0, fill: false, tension: 0.4 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                scales: { y: { min: -2.5, max: 2.5, grid: { display: false }, ticks: { display: false } }, x: { display: false } },
                plugins: { legend: { display: false } }
            }
        });

        function handleFiles() {
            const files = document.getElementById('fileInput').files;
            for(let f of files) {
                const id = queue.length;
                queue.push(f);
                document.getElementById('fileQueue').innerHTML += `
                    <div class="file-item" id="file-${id}">
                        <div class="file-info-top">
                            <span><i class="fas fa-file-wave me-1 text-info"></i> ${f.name}</span>
                            <span id="badge-${id}" class="badge bg-dark">Attente</span>
                        </div>
                        <img id="scalo-${id}" class="scalogram-preview" src="" alt="Scalogram Analysis">
                    </div>
                `;
            }
        }

        async function processQueue() {
            if(currentIndex >= queue.length) return;
            document.getElementById('startBtn').disabled = true;
            isPaused = false;
            
            for(let i = currentIndex; i < queue.length; i++) {
                if(isPaused) break;
                currentIndex = i;
                await runAnalysis(i);
            }
        }

        async function runAnalysis(idx) {
            const file = queue[idx];
            const el = document.getElementById(`file-${idx}`);
            const badge = document.getElementById(`badge-${idx}`);
            const scaloImg = document.getElementById(`scalo-${idx}`);
            
            el.classList.add('processing');
            badge.innerText = "Analyse...";
            document.getElementById('currentFileLabel').innerText = `Analyse : ${file.name}`;
            
            const fd = new FormData();
            fd.append('file', file);

            try {
                const res = await fetch('/predict', { method: 'POST', body: fd });
                const data = await res.json();

                for(let val of data.signal) {
                    if(isPaused) return;
                    chart.data.datasets[0].data.push(val);
                    if(chart.data.datasets[0].data.length > 100) chart.data.datasets[0].data.shift();
                    chart.update('none'); 
                    await new Promise(r => setTimeout(r, 12));
                }

                scaloImg.src = data.img_url;
                scaloImg.style.display = "block";

                if(data.res_text.toLowerCase().includes("seizure")) {
                    triggerEmergency(el, badge);
                } else {
                    el.classList.remove('processing');
                    badge.className = "badge bg-success";
                    badge.innerText = "Sain";
                    await new Promise(r => setTimeout(r, 800));
                }
            } catch(e) { console.error(e); }
        }

        function triggerEmergency(el, badge) {
            isPaused = true;
            el.className = 'file-item danger';
            badge.className = "badge bg-danger";
            badge.innerText = "CRISE !";
            document.getElementById('screenBox').classList.add('emergency-active');
            document.getElementById('overlay-text').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('alarm').play();
        }

        function resumeAnalysis() {
            isPaused = false;
            document.getElementById('screenBox').classList.remove('emergency-active');
            document.getElementById('overlay-text').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('alarm').pause();
            currentIndex++; 
            processQueue();
        }
    </script>
</body>
</html>
