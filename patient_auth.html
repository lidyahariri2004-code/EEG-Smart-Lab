<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Patient | Smart EEG Lab</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --medical-blue: #1e3a8a;
            --bg-light: #ffffff;
        }

        /* ضبط الشاشة كاملة 100% بدون أي هوامش */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* الجانب الأيسر (الكارت الأزرق) */
        .sidebar-card {
            flex: 0 0 35%; 
            background: linear-gradient(180deg, #1e3a8a 0%, #172554 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        /* إطار الصورة الشخصية */
        .patient-photo-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 6px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            margin-bottom: 25px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .patient-photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* كارت البيانات الصغير */
        .info-badge {
            background: rgba(255,255,255,0.1);
            width: 95%;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        /* الجانب الأيمن (النماذج) */
        .form-section {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 10%;
            overflow-y: auto; /* يسمح بالتمرير (Scroll) في جهة النماذج فقط */
        }

        .welcome-msg h2 {
            color: var(--medical-blue);
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        /* أزرار التبديل (Tabs) */
        .tabs-nav {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
            max-width: 450px;
            border: 1px solid #e2e8f0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            color: #64748b;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: var(--medical-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* تنسيق حقول الإدخال */
        .input-box { margin-bottom: 20px; }
        .input-box label {
            display: block;
            font-weight: 700;
            color: #475569;
            margin-bottom: 5px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: var(--medical-blue);
            outline: none;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.05);
        }

        /* الزر الرئيسي */
        .action-btn {
            width: 100%;
            max-width: 450px;
            padding: 16px;
            background: var(--medical-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #1e40af;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 58, 138, 0.2);
        }
        /* هذا الكود يخدم غير كي تفتحي من التيليفون (شاشة صغيرة) */
@media (max-width: 600px) {
    body {
        padding: 10px; /* نخلو شوية فراغ في الجوانب */
    }

    /* العنوان نتاعك "Analyse Neurale IA" نرجوه يتوسط الشاشة */
    h1, h2 {
        font-size: 24px !important;
        text-align: center;
    }

    /* الأزرار نرجوهم يدو عرض الشاشة كامل باش يجو ساهلين للمس */
    .btn-login, .btn-scan, button {
        width: 100% !important;
        margin-bottom: 15px;
        height: 55px; /* نكبروهم شوية للصبع */
        font-size: 18px !important;
    }

    /* المربعات السوداء (Grids) نرجعوهم يجوا واحد فوق واحد */
    .container, .grid-layout {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    /* إذا عندك Sidebar يولي يختفي أو يجي الفوق */
    .sidebar {
        width: 100% !important;
        position: relative !important;
    }
}
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>

    <div class="main-wrapper">
        
        <!-- الجانب الأيسر -->
        <div class="sidebar-card">
            <div class="patient-photo-circle">
                <!-- تم التعديل إلى .jpg بناءً على الصورة التي أرسلتِها -->
                <img src="{{ url_for('static', filename='image/malad.png') }}" alt="Patient">
            </div>
            
            <div class="brand-title">EEG LAB</div>
            <p class="opacity-75">Système d'analyse cérébrale IA</p>

            <div class="info-badge">
                <div class="info-item">
                    <span><i class="fas fa-user-shield me-2"></i> Dossier:</span>
                    <span class="fw-bold">#2026-PAT</span>
                </div>
                <div class="info-item">
                    <span><i class="fas fa-phone-alt me-2 text-warning"></i> Urgence:</span>
                    <span class="fw-bold">Contact Famille</span>
                </div>
                <div class="info-item">
                    <span><i class="fas fa-clock me-2"></i> Statut:</span>
                    <span class="text-success fw-bold">Monitoring Actif</span>
                </div>
            </div>
        </div>

        <!-- الجانب الأيمن -->
        <div class="form-section">
            <div class="welcome-msg">
                <h2>Bienvenue</h2>
                <p class="text-muted fs-5">Accédez à votre espace sécurisé.</p>
            </div>

            <div class="tabs-nav">
                <div id="t1" class="tab-btn active" onclick="toggleView(1)">Connexion</div>
                <div id="t2" class="tab-btn" onclick="toggleView(2)">Nouveau Dossier</div>
            </div>

            <!-- فورم الدخول -->
            <form id="f1" action="/patient_login_action" method="POST" style="max-width: 450px;">
                <div class="input-box">
                    <label>Identifiant Patient</label>
                    <input type="text" name="user" placeholder="Votre nom d'utilisateur" required>
                </div>
                <div class="input-box">
                    <label>Mot de passe</label>
                    <input type="password" name="pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="action-btn">Ouvrir la session</button>
            </form>

            <!-- فورم التسجيل -->
            <form id="f2" action="/patient_register_action" method="POST" style="display:none; max-width: 550px;">
                <div class="row g-2">
                    <div class="col-6 input-box">
                        <label>Nom</label>
                        <input type="text" name="nom" required>
                    </div>
                    <div class="col-6 input-box">
                        <label>Prénom</label>
                        <input type="text" name="prenom" required>
                    </div>
                </div>
                <div class="row g-2">
                    <div class="col-4 input-box">
                        <label>Âge</label>
                        <input type="number" name="age" required>
                    </div>
                    <div class="col-8 input-box">
                        <label>Tél. Urgence</label>
                        <input type="tel" name="phone_parent" required>
                    </div>
                </div>
                <div class="input-box">
                    <label>Mot de passe</label>
                    <input type="password" name="pass" required>
                </div>
                <button type="submit" class="action-btn">Créer mon dossier</button>
            </form>
        </div>
    </div>

    <script>
        function toggleView(n) {
            document.getElementById('f1').style.display = n==1 ? 'block' : 'none';
            document.getElementById('f2').style.display = n==2 ? 'block' : 'none';
            document.getElementById('t1').classList.toggle('active', n==1);
            document.getElementById('t2').classList.toggle('active', n==2);
        }
    </script>
</body>
</html>
